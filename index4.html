<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <title>JOVI Scan 3</title>
</head>

<body>

  <main class="container">
    <section class="phone">
      <header class="top-icons">

        <a href="#"><i class="fa-solid fa-bolt"></i></a>

        <a href="#"><i class="fa-solid fa-wand-magic-sparkles"></i></a>

        <a href="#"><i class="fa-regular fa-clock"></i></a>

        <a href="#"><i class="fa-solid fa-expand"></i></a>

        <a href="#"><i class="fa-solid fa-layer-group"></i></a>

        <a href="#"><i class="fa-solid fa-gear"></i></a>

      </header>

      <section class="camera-areab">
        <img src=".lousa.jpeg" alt="Preview câmera">
        <div class="overlay"></div>
        <div class="scan-lines">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="scan-lines1">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="scan-lines2">
            <span></span>
            <span></span>
        </div>
        <div class="scan-lines3">
            <span></span>
        </div>

        <div class="scan-corners corner-top-left"></div>
        <div class="scan-corners corner-top-right"></div>
        <div class="scan-corners corner-bottom-left"></div>
        <div class="scan-corners corner-bottom-right"></div>

        <a href=".index5.html" class="scan-message">
            <i class="fa-solid fa-sparkles"></i>
            <p>Habilitar foco</p>
        </a>

      </section>

        <div class="camera-screen">
            <img src=".scan-barcode-svgrepo-com.svg" class="scan-icon">
        </div>

      <section class="scan-mode">

        <nav class="modes">

          <a href="#">RETRATO</a>
          <a href="#">FOTO</a>
          <a href="#" class="active-mode">SCAN</a>
          <a href="#">VÍDEO</a>
          <a href="#">MAIS</a>

        </nav>

      <section class="camera-controls">

          <a href="./index3.html" class="gallery-btn">
             <img src=".lousa.jpeg" alt="">
         </a>

            <a href="./index4.html" class="capture-btn"></a>

         <div class="rotate-btn">
            <i class="fa-solid fa-rotate"></i>
        </div>

      </section>

      </section>

    <footer class="bottom-menu">

        <a href="#">
            <i class="fa-solid fa-bars"></i>
         </a>

         <a href="#" class="active-bottom">
             <div class="camera-dot"></div>
        </a>

         <a href="#">
             <i class="fa-solid fa-chevron-left"></i>
         </a>

    </footer>

    </section>

  </main>

</body>
</html>
