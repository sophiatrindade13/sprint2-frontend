<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

  <link rel="stylesheet" href="style.css">

  <title>JOVI Scan 2</title>
</head>

<body>

  <main class="container">

    <!-- CELULAR -->
    <section class="phone">

      <header class="top-icons">

    <a href="#"><i class="fa-solid fa-bolt"></i></a>

    <a href="#"><i class="fa-solid fa-wand-magic-sparkles"></i></a>

    <a href="#"><i class="fa-regular fa-clock"></i></a>

    <a href="#"><i class="fa-solid fa-expand"></i></a>

    <a href="#"><i class="fa-solid fa-layer-group"></i></a>

    <a href="#"><i class="fa-solid fa-gear"></i></a>

</header>

      <!-- ÁREA DA CÂMERA -->
      <section class="camera-areab">

        <img src="lousa.jpeg" alt="Preview câmera">
        <div class="overlay"></div>


        <!-- CANTOS SCAN -->
        <div class="scan-corners corner-top-left"></div>
        <div class="scan-corners corner-top-right"></div>
        <div class="scan-corners corner-bottom-left"></div>
        <div class="scan-corners corner-bottom-right"></div>

    

        <!-- ZOOM -->
        <nav class="zoom-controls">

          <a href="#">0.6</a>
          <a href="#" class="active-zoom">1x</a>
          <a href="#">2</a>

        </nav>

      </section>

      <!-- ICONE SCAN-->
        <div class="camera-screen">
            <img src="scan-barcode-svgrepo-com.svg" class="scan-icon">
        </div>

      <!-- MODO SCAN -->
      <section class="scan-mode">


        <!-- MENU MODOS -->
        <nav class="modes">

          <a href="#">RETRATO</a>
          <a href="#">FOTO</a>
          <a href="#" class="active-mode">SCAN</a>
          <a href="#">VÍDEO</a>
          <a href="#">MAIS</a>

        </nav>

        <!-- CONTROLES -->
    <section class="camera-controls">

          <a href="/index3.html" class="gallery-btn">
             <img src="lousa.jpeg" alt="">
         </a>

              <a href="/index4.html" class="capture-btn"></a>

         <div class="rotate-btn">
            <i class="fa-solid fa-rotate"></i>
        </div>

    </section>

      </section>

      

      <!-- MENU INFERIOR -->
    <footer class="bottom-menu">

        <!-- MENU -->
        <a href="#">
            <i class="fa-solid fa-bars"></i>
         </a>

         <!-- BOLINHA -->
         <a href="#" class="active-bottom">
             <div class="camera-dot"></div>
        </a>

         <!-- SETA -->
         <a href="#">
             <i class="fa-solid fa-chevron-left"></i>
         </a>

    </footer>

    </section>

  </main>

</body>
</html>
